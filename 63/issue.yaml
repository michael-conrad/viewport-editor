title: '[SPEC] Composite action tools for agent intent matching (read, write, edit,
  find, diff)'
status: open
labels:
- SPEC
body: "# [SPEC] Composite Action Tools for Agent Intent Matching\n\n## Problem\n\n\
  AI agents consistently prefer the platform's built-in tools (`read`, `edit`, `write`,\
  \ `grep`) over the viewport-editor's custom tools. This defeats the purpose of having\
  \ a staged-buffer editing system with conflict detection, since agents bypass it\
  \ entirely.\n\n**Root cause:** The agent's tool selection bias operates on four\
  \ dimensions, and the viewport-editor loses on ALL of them simultaneously:\n\n|\
  \ Dimension | Built-in tools | Viewport-editor tools |\n|-----------|---------------|----------------------|\n\
  | **Semantic match** | Tool name IS the intent verb (`read`, `write`, `edit`) |\
  \ Tool names describe implementation mechanism (`viewport`, `edit`, `file`, `diff`)\
  \ — not intent |\n| **Position bias** | Built-ins appear first in the tool listing\
  \ | Viewport-editor tools appear later |\n| **Pre-training exposure** | High-frequency\
  \ English verbs seen millions of times in training data | Novel names with zero\
  \ pre-training exposure |\n| **Call count** | 1 call per operation | 3+ calls per\
  \ operation (open → edit/replace → file/save) |\n\n**Research corroboration:** The\
  \ BiasBusters paper (arXiv 2510.00307, ICLR 2026) confirms that semantic alignment\
  \ between user queries and tool names is the strongest driver of selection. The\
  \ mcp-naming-bias study shows semantic matching overrides position bias 100% of\
  \ the time across all tested models (Claude, GPT-4o, Gemini, DeepSeek, Mistral,\
  \ Qwen, Llama). Anthropic's \"Writing Effective Tools for Agents\" guide explicitly\
  \ recommends composite actions that consolidate multi-step workflows into single\
  \ tools named after the agent's *intent*, not the *implementation*.\n\n**Current\
  \ architecture:** 6 tools with action dispatch parameters (viewport, edit, file,\
  \ diff, search, regex). To perform a file read, the agent must call `viewport-editor_viewport`\
  \ with `action=\"open\"`, then parse the YAML response. To write, it must call `viewport-editor_edit`\
  \ with `action=\"replace-all\"`, then `viewport-editor_file` with `action=\"save\"\
  `. No tool name matches any agent intent verb directly. See [Card 6: The Semantic\
  \ Gap](spec-artifacts/research/card-catalogue.md#card-6-the-semantic-gap--viewport-editor-vs-built-in)\
  \ for the full diagnostic mapping of agent intent vs current tool surface.\n\n##\
  \ Solution\n\nAdd **5 composite-action MCP tools** named after agent intent verbs.\
  \ Each is a standalone MCP tool entry (not an action on an existing tool) that internally\
  \ delegates to the existing viewport/edit/file pipeline but presents as a single-call\
  \ verb:\n\n| New Tool | Agent Intent | Internal Workflow | Analogous Built-in |\n\
  |----------|-------------|-------------------|--------------------|\n| `read` /\
  \ `read_file` | \"I want to read a file\" | open viewport → return content | `read(path,\
  \ offset, limit)` |\n| `write` / `write_file` | \"I want to create/replace a file\"\
  \ | open viewport → replace-all content → save → close | `write(path, content)`\
  \ |\n| `edit` / `edit_text` | \"I want to make a targeted edit\" | open viewport\
  \ → replace(s) → save → close | `edit(path, old, new)` |\n| `find` / `find_text`\
  \ | \"I want to search file contents\" | search:find → return results | `grep(pattern)`\
  \ |\n| `diff` | \"I want to see what changed\" | diff:show → return diff | none\
  \ (unique) |\n\n**Naming convention:** The MCP config key (e.g., `viewport-editor`)\
  \ already provides the platform-level namespace. The agent sees `viewport-editor_read`,\
  \ not bare `read`. Adding an extra prefix like `vp_` is redundant. Two naming variants\
  \ will be tested:\n\n- **`verb`** — `read`, `write`, `edit`, `find`, `diff` — shortest,\
  \ cleanest, unambiguous within this server\n- **`verb_noun`** — `read_file`, `write_file`,\
  \ `edit_text`, `find_text` — explicit when disambiguation is needed\n\n`diff` has\
  \ no `verb_noun` variant — `diff` is already unambiguous and `diff_file` adds no\
  \ signal.\n\nThe existing 7 tools remain unchanged — these are additive. The composite\
  \ tools are the **entry point** for agents; the low-level tools (`viewport`, `edit`,\
  \ `file`, `diff`, `clipboard`, `search`, `regex`) remain available for fine-grained\
  \ control, staging, and diff review.\n\n**IMPORTANT: Final naming and descriptions\
  \ are NOT decided by this spec. They MUST be determined by iterative empirical testing\
  \ per the Iterative Testing Protocol (see spec-artifacts/).** Verb choice, specificity\
  \ level, comparison framing, and coexistence strategy are all variables to be tested,\
  \ not design decisions.\n\n### Design Principles\n\n- **Single-call semantics:**\
  \ The agent makes 1 tool call for the most common operations, not 3.\n- **Staging-by-default:**\
  \ The composite tools use the viewport buffer internally. They do NOT bypass the\
  \ staging system — they just manage the viewport lifecycle transparently.\n- **Diff\
  \ visibility:** After composite operations, the agent can still inspect staged changes\
  \ via `diff:show` before closing, since the viewport remains open during the buffer-flush\
  \ window.\n- **No redundant prefix:** MCP config key already provides namespace.\
  \ Tool names are `verb` or `verb_noun` only.\n- **Parameter naming:** Follows the\
  \ same `line_start`/`line_end` convention established in spec #39.\n\n## Tool Definitions\
  \ (Provisional — Subject to Testing)\n\n### Tool 1: `read` / `read_file`\n```\n\
  Read a file's contents via a scoped viewport window. Supports offset/limit for partial\
  \ reads.\n\nParameters:\n  file_path (string, required): Relative path from project\
  \ root\n  line_start (integer, optional, default 1): First line to read\n  line_end\
  \ (integer, optional, default 100): Last line to read\n\nReturns: File content,\
  \ viewport metadata (line range, mtime, size), and conflict warnings.\n```\n\nInternal\
  \ flow: Calls `viewport:open` with the file path → returns the YAML content block.\
  \ The viewport remains open for follow-up edits.\n\n### Tool 2: `write` / `write_file`\n\
  ```\nCreate a new file or overwrite an existing file with the given content. \n\
  Internally stages content through the buffer with conflict detection.\n\nParameters:\n\
  \  file_path (string, required): Relative path from project root\n  content (string,\
  \ required): Full file content to write\n\nReturns: Confirmation with mtime, size,\
  \ and any conflict warnings.\n\nError conditions:\n- File modified externally since\
  \ last read (conflict)\n- Path traversal outside project root\n```\n\nInternal flow:\
  \ Opens viewport → replaces entire content → saves → closes viewport. If the file\
  \ doesn't exist, creates it.\n\n### Tool 3: `edit` / `edit_text`\n```\nPerform a\
  \ targeted text replacement in a file. \nStages through the buffer with conflict\
  \ detection.\n\nParameters:\n  file_path (string, required): Relative path from\
  \ project root\n  old_text (string, required): Text to replace\n  new_text (string,\
  \ required): Replacement text\n\nReturns: Confirmation with match count and any\
  \ conflict warnings.\n\nError conditions:\n- File not found\n- `old_text` not found\
  \ (zero matches)\n- Multiple ambiguous matches without specificity\n- File modified\
  \ externally (conflict)\n```\n\nInternal flow: Opens viewport → calls `edit:replace-all`\
  \ → saves → closes viewport.\n\n### Tool 4: `find` / `find_text`\n```\nSearch file\
  \ contents for a pattern. Supports substring (default) and regex matching.\n\nParameters:\n\
  \  pattern (string, required): Text or regex pattern to search for\n  file_path\
  \ (string, optional): Scope to a single file\n  regex (boolean, optional, default\
  \ false): Enable regex matching\n\nReturns: Structured results with line numbers,\
  \ file paths, and matching text.\n```\n\nInternal flow: Calls `search:find` with\
  \ the given parameters → returns structured results.\n\n### Tool 5: `diff`\n```\n\
  Show the unified diff of pending buffer changes for a file. \nUse before save to\
  \ review what changed.\n\nParameters:\n  file_path (string, required): Relative\
  \ path from project root\n\nReturns: Unified diff of staged changes, or empty if\
  \ no pending changes.\n```\n\nInternal flow: Opens viewport if not already open\
  \ → calls `diff:show` → returns diff.\n\n## Existing Tools Preserved\n\nAll 7 existing\
  \ tools (`viewport`, `edit`, `file`, `diff`, `clipboard`, `search`, `regex`) remain\
  \ unchanged. The agent selects between:\n\n- **Composite path (recommended):** `read`\
  \ / `write` / `edit` / `find` / `diff` for simple operations — 1 call, intent-matching\
  \ names\n- **Fine-grained path:** `viewport:open` → `edit:replace` → `diff:show`\
  \ → `file:save` for complex multi-edit workflows requiring review\n\nThe composite\
  \ tools handle the common case. The existing tools handle the edge cases and advanced\
  \ workflows (clipboard operations, diff apply, regex testing, multi-viewport staging).\n\
  \n## Spec Requirements\n\n### R1: Existing tool descriptions must be re-written\
  \ in agent-facing style\n\nThe 7 existing tools (`viewport`, `edit`, `file`, `diff`,\
  \ `clipboard`, `search`, `regex`) currently use mechanism-language descriptions:\n\
  \n> \"Viewport text editor — buffer-isolated file access for auditable, undoable\
  \ edits.\"\n\nThese descriptions counteract the composite tools' intent-language\
  \ strategy. When an agent browses the full tool listing, mechanism language dilutes\
  \ the intent alignment of the composites. All 7 existing tool descriptions must\
  \ be re-written in the same agent-facing, constraint-stating style as the composite\
  \ tools. This is a separate pass from the composite tool implementation — descriptions\
  \ are text-only changes, not code changes.\n\n### R2: write/edit overlap must be\
  \ pre-addressed\n\n`write` and `edit` overlap in agent intent space. An agent with\
  \ prompt \"fix this typo in server.py\" could match either tool. The spec must pre-address\
  \ this before implementation:\n\n- **Option A (merge):** Remove `edit` and fold\
  \ targeted replacement into `write` via a `mode` parameter (`mode=replace` vs `mode=overwrite`).\
  \ Reduces tool count but adds a parameter.\n- **Option B (differentiate by scope):**\
  \ `edit` handles changes under N characters (single-line, targeted). `write` handles\
  \ full-file replacement. Descriptions must explicitly state the boundary.\n- **Option\
  \ C (test-driven):** Deploy both and measure selection confusion. If confusion exceeds\
  \ 30%, fall back to Option A or B.\n\n**Decision:** Option C is the default. The\
  \ iterative testing protocol (V1) will measure selection confusion between `write`\
  \ and `edit` for prompts that could match either. If confusion exceeds 30% across\
  \ models, the implementation must adopt Option A or B before deployment.\n\n###\
  \ R3: DeepSeek gating criterion for V1 testing\n\nDeepSeek shows 100% position-0\
  \ bias in the mcp-naming-bias experiments — the strongest position bias of any tested\
  \ model. If semantic matching truly overrides position bias, DeepSeek should still\
  \ select the composite tool at >80% rate when the name matches the prompt intent.\
  \ If it does not, the research generalization fails for the most position-biased\
  \ model in the test set.\n\n**Rule:** V1 verb-class testing must run against `ollama/deepseek-v4-flash:cloud`\
  \ first. If selection rate is below 80% for any composite tool, halt testing and\
  \ re-evaluate the naming strategy before proceeding to other models. A failure here\
  \ means semantic matching alone is insufficient to overcome position bias for this\
  \ model class, and additional strategies (description engineering, platform-level\
  \ tool filtering) must be explored.\n\n### R4: Positive framing mandate for all\
  \ tool descriptions\n\nThe mcp-naming-bias experiments show that negative-sentiment\
  \ names (`deprecated`) are avoided 0% of the time across all models, while positive-sentiment\
  \ names (`recommended`) dominate selection (100% for Claude, DeepSeek, Mistral).\
  \ This applies to description text as well as tool names.\n\n**Rule:** All tool\
  \ descriptions — both composite and existing — MUST use positive framing only. Prohibited\
  \ patterns include:\n- \"Unlike the built-in read...\" (negative comparison)\n-\
  \ \"Avoids data loss\" (negative framing — implies danger)\n- \"Prevents corruption\"\
  \ (negative framing)\n- \"Instead of X...\" (comparison framing)\n\nRequired patterns:\n\
  - \"Staged editing for safe review\" (positive outcome)\n- \"Conflict detection\
  \ included\" (feature statement)\n- \"Preferred for file operations\" (positive\
  \ sentiment)\n- \"Supports offset/limit for partial reads\" (capability statement)\n\
  \nThis is a hard requirement, not a test variable. The V3 comparison framing test\
  \ will confirm the optimal positive variant, but negative framing is prohibited\
  \ regardless of test outcome.\n\n### R5: Description specificity must be determined\
  \ empirically (V2 testing)\n\nThe Over-Specification Paradox (S* ~0.509 from opencode-config#161)\
  \ shows that too much detail in descriptions can paradoxically reduce reliability.\
  \ Anthropic's guide confirms that small description refinements produce dramatic\
  \ effects on tool selection. The optimal specificity level varies by model.\n\n\
  **Rule:** V2 testing must test three description specificity levels for each composite\
  \ tool:\n\n- **Minimal:** `\"Read file contents.\"` — bare imperative, no constraints\n\
  - **Constraint-statement:** `\"Read a file's contents via a scoped viewport window.\
  \ Supports line_start/line_end for partial reads.\"` — Anthropic-recommended pattern:\
  \ state what it does, state the constraints\n- **Elaborated:** Full paragraph with\
  \ parameter details, use cases, and edge cases — risks hitting the S* over-specification\
  \ threshold\n\nThe winning level is determined by selection rate across all 4 models.\
  \ The constraint-statement level is the expected winner per Anthropic's findings,\
  \ but must be confirmed empirically. If the elaborated level wins for any model,\
  \ investigate whether the S* threshold varies by model architecture.\n\n## Evaluation\
  \ Methodology\n\n### Test Configs and Directory Structure\n\nTool configs are per-variant\
  \ YAML files in `test/tool-selection/configs/`. Each config specifies the tool name,\
  \ description text, variant label, and metadata needed by the test harness. Configs\
  \ are prompt-level — since composite tools don't exist yet, descriptions are embedded\
  \ in scenario prompts rather than MCP server definitions.\n\n```\ntest/tool-selection/\n\
  \  run.sh                          — Convenience runner (--variable, --model, --iterations,\
  \ --gating, --quick, --dry-run)\n  run_v1_verb_class.sh            — V1: verb vs\
  \ verb_noun across 5 tools\n  run_v2_description.sh           — V2: minimal vs constraint\
  \ vs elaborated\n  run_v3_framing.sh               — V3: bare vs positive differentiation\n\
  \  run_v4_position.sh              — V4: composite-first vs composite-last vs composite-middle\n\
  \  run_v5_coexistence.sh           — V5: neutral vs instructional vs preference-hinting\n\
  \  configs/\n    v1_verb_class/\n      read-verb.yaml\n      read-verb_noun.yaml\n\
  \      write-verb.yaml\n      write-verb_noun.yaml\n      edit-verb.yaml\n     \
  \ edit-verb_noun.yaml\n      find-verb.yaml\n      find-verb_noun.yaml\n      diff.yaml\
  \                   (no noun variant)\n    v2_description/\n      read-minimal.yaml\n\
  \      read-constraint.yaml\n      read-elaborated.yaml\n      ...per-tool...\n\
  \    v3_framing/\n      read-bare.yaml\n      read-positive_diff.yaml\n      ...per-tool...\n\
  \    v4_position/\n      composite-first.yaml\n      composite-last.yaml\n     \
  \ composite-middle.yaml\n    v5_coexistence/\n      read-neutral.yaml\n      read-instructional.yaml\n\
  \      read-preference-hinting.yaml\n      ...per-tool...\n  README.md         \
  \              — How to run tests, interpret results\n```\n\n### Config File Schema\n\
  \n```yaml\n# Common fields for all configs\nvariable: v1                      #\
  \ v1|v2|v3|v4|v5\nvariant: verb                     # Variant label (e.g. \"verb\"\
  , \"verb_noun\", \"minimal\")\ntool: read                        # MCP tool name\n\
  composite: true\ntarget_intent: \"read a file\"      # Agent intent this tool targets\n\
  expected_alternative: \"read\"      # Built-in tool this competes with\ndescription:\
  \ \"...\"                # Tool description text (the variable being tested)\n```\n\
  \n### Scenario Naming Convention\n\nEach `behavior_run()` call uses a scenario name\
  \ encoding: variable, tool, variant, model, iteration number.\n\nFormat: `v<VAR>-<TOOL>-<VARIANT>-<MODEL_SLUG>-<ITERATION>`\n\
  \nExamples:\n- `v1-read-verb-deepseek-01`\n- `v1-read-verb_noun-deepseek-01`\n-\
  \ `v2-read-constraint-nemotron-05`\n- `v3-read-positive_diff-qwen-10`\n\nThis produces\
  \ artifact directories like:\n`tmp/behavioral-evidence-v1-read-verb-deepseek-01-GREEN-ollama-deepseek-v4-flash-cloud/`\n\
  \n### Iteration Logic\n\nEach run script iterates over (configs × models × iterations)\
  \ with a flat loop:\n```\nfor config in configs/v1_verb_class/*.yaml:\n  for model\
  \ in [deepseek, gpt-oss, nemotron, qwen]:\n    for iteration in 1..20:\n      scenario_name\
  \ = encode(config.variable, config.tool, config.variant, model, iteration)\n   \
  \   behavior_run(scenario_name, build_prompt(config), model)\n```\n\nThe bash tool\
  \ sets the sole timeout boundary. No internal timer. No `timeout` command wrapping.\
  \ No assertions.\n\n### Trace Report (Post-Cycle Aggregation)\n\nTimeout discipline\
  \ is a hard requirement per bug #1076. The bash tool's native timeout parameter\
  \ is the **sole timeout boundary** — no `timeout` command wrapping inside the bash\
  \ invocation, and `behavior_run()` MUST NOT use an internal timer. Nested timeouts\
  \ (bash tool timeout + internal timer inside the script) cause the shell to be killed\
  \ while `opencode-cli run` and its MCP subprocesses continue as orphaned children.\
  \ Bash tool timeout must be either 0 (no timeout) or set to the maximum acceptable\
  \ wall-clock duration for the full run including retries.\n\n**SSE Read Timeout:**\
  \ The `opencode.jsonc` model configuration for all ollama/ models must set a reasonable\
  \ `sse_read_timeout` value to prevent \"blackholed\" connections (connections that\
  \ accept but never send data) from blocking test runs indefinitely. This is a platform-level\
  \ setting in the opencode configuration, not a test harness concern. The test environment's\
  \ opencode.jsonc must be verified to have this configured before any V1–V5 testing\
  \ begins.\n\n### Clean-Room Sub-Agent Evaluation\n\nEvaluation is performed by a\
  \ clean-room sub-agent dispatched from the implementation pipeline. The sub-agent\
  \ receives:\n\n- The artifact directory path (containing stdout.log, stderr.log,\
  \ manifest.yaml)\n- A structured evaluation prompt specifying what to assess\n\n\
  The sub-agent reads the artifacts and applies semantic judgment to determine:\n\n\
  - **selected_tool:** Which tool the agent ultimately called (from stderr tool dispatch\
  \ trace)\n- **deliberation_evidence:** Whether the agent's reasoning trace (stdout)\
  \ shows it considered multiple tools before selecting one\n- **almost_correct:**\
  \ The agent nearly selected the composite tool but switched away, or nearly selected\
  \ the built-in but switched to the composite\n- **confusion_indicators:** Specific\
  \ phrases or reasoning patterns suggesting the agent misunderstood the tool's purpose\
  \ or scope\n- **reasoning_quality:** Qualitative assessment of whether the agent's\
  \ tool selection reasoning was sound\n\nThe sub-agent receives ONLY the artifact\
  \ directory path and the evaluation prompt — no orchestrator reasoning, no expected\
  \ outcomes, no cached results. This is a clean-room assessment per the DISPATCH_GATE\
  \ protocol.\n\n### Result Artifact Storage\n\nEvaluation results are stored as a\
  \ structured file (YAML or JSON) in the same artifact directory as the test run\
  \ they evaluate:\n\n```\ntmp/behavioral-evidence-<scenario>-<phase>-<model>/\n \
  \ manifest.yaml        — Test run metadata\n  stdout.log           — Agent prose\
  \ response\n  stderr.log           — Tool dispatch trace\n  evaluation.yaml    \
  \  — Sub-agent evaluation results (added after evaluation pass)\n```\n\nThis keeps\
  \ the evaluation results co-located with the source artifacts they assess. The evaluation.yaml\
  \ file contains the sub-agent's findings per the schema above, plus a reference\
  \ to the sub-agent model used for evaluation.\n\n### Frugal Result Contracts\n\n\
  Per the orchestrator context discipline (020-go-prohibitions.md §1.1), the evaluation\
  \ sub-agent returns only a routing-significant result contract:\n\n```yaml\nstatus:\
  \ DONE\nfinding_summary: \"V1 verb-class: read verb variant achieved 85% selection\
  \ across 4 models. write/edit overlap at 22% — below 30% threshold.\"\nartifact_path:\
  \ tmp/behavioral-evidence-v1-verb-class-deepseek/\nblocker_reason: null\n```\n\n\
  Full evaluation details (per-run breakdowns, confusion matrices, qualitative findings)\
  \ go into `evaluation.yaml` in the artifact directory — never into the result contract.\n\
  \n### Trace Report (Post-Cycle Aggregation)\n\nAfter each full test cycle, a dedicated\
  \ clean-room sub-agent reads ALL `evaluation.yaml` files from all artifact directories\
  \ and produces a cycle trace report with archive. The prior trace is preserved —\
  \ each cycle produces a new entry.\n\n**Archive structure:**\n\n```\ntest/tool-selection/trace-archive/\n\
  \  trace-cycle-001.yaml           — Structured data for cycle 1\n  trace-cycle-001.md\
  \             — Human-readable narrative for cycle 1\n  trace-cycle-002.yaml   \
  \        — Cycle 2 (includes progress vs cycle 1)\n  trace-cycle-002.md\n  ...\n\
  ```\n\n**Per-cycle report contents:**\n\n- **Run metadata:** cycle number, date\
  \ range, models tested, variables covered, iteration count per variant\n- **Per-variable\
  \ summary tables:** variant tested, selection rate per model, declared winner\n\
  - **Progress since prior cycle:** selection rate deltas, confusion deltas, new winning\
  \ configurations\n- **Per-model bias profile:** how each model responded across\
  \ all variables\n- **Confusion matrix** for write/edit overlap (V1)\n- **Lessons\
  \ learned:** qualitative findings from evaluator notes across all runs\n- **Winning\
  \ configuration lock:** final naming, description level, framing, and coexistence\
  \ strategy per tool\n\n**Frugal contract:** The trace sub-agent returns only `status:\
  \ DONE` or `blocker_reason` if data is insufficient to declare winners. Full details\
  \ go into the trace archive files — never into the result contract.\n\n## Branch\
  \ and Tagging Strategy\n\n### Feature Branch\n\nA dedicated feature branch `feature/63-composite-tools`\
  \ tracks all work for this spec: test scripts, implementation code, and description\
  \ rewrites. The test harness sources the correct tool definitions via `opencode.jsonc`\
  \ configuration — no PR merge boundaries needed between phases. The branch accumulates\
  \ all changes atomically.\n\n### Rollback Tags\n\nGit tags mark each major checkpoint\
  \ for rollback:\n\n| Tag | Point | Contents |\n|-----|-------|----------|\n| `63/checkpoint/testing-start`\
  \ | Before any V1 testing begins | Clean dev branch state, spec finalized |\n| `63/checkpoint/v1-complete`\
  \ | After V1 verb-class testing done | Winning verb variant determined, evaluation.yaml\
  \ stored |\n| `63/checkpoint/v2-complete` | After V2 description specificity done\
  \ | Winning description level determined |\n| `63/checkpoint/v3-complete` | After\
  \ V3 comparison framing done | Winning framing determined |\n| `63/checkpoint/v4-complete`\
  \ | After V4 position testing done | Position effect data collected |\n| `63/checkpoint/v5-complete`\
  \ | After V5 coexistence testing done | Winning strategy determined |\n| `63/checkpoint/implementation-start`\
  \ | Before writing any composite tool code | All testing results finalized, winning\
  \ config locked |\n| `63/checkpoint/composite-tools` | After 5 composite tools implemented\
  \ | All 5 tools registered, tests pass |\n| `63/checkpoint/descriptions` | After\
  \ 7 existing tool descriptions rewritten | All descriptions in agent-facing style\
  \ |\n\nTag format: `63/checkpoint/<phase>` per the git-workflow convention. Tags\
  \ are lightweight (not annotated) and local-only unless pushed explicitly.\n\n##\
  \ Implementation\n\n### New Code\n\nOnly `src/viewport_editor/server.py` changes\
  \ — 5 new `@mcp.tool()` registrations, each delegating to a composite handler function.\
  \ The handler functions call the existing `ViewportManager` API:\n\n```python\n\
  @mcp.tool()\ndef read(ctx: Context, file_path: str, line_start: int = 1, line_end:\
  \ int = 100) -> str:\n    \"\"\"Read a file's contents via a scoped viewport window\
  \ with conflict detection.\"\"\"\n    ...\n\n@mcp.tool()\ndef write(ctx: Context,\
  \ file_path: str, content: str) -> str:\n    \"\"\"Create or overwrite a file with\
  \ the given content. Stages through buffer with conflict detection.\"\"\"\n    ...\n\
  \n@mcp.tool()\ndef edit(ctx: Context, file_path: str, old_text: str, new_text: str)\
  \ -> str:\n    \"\"\"Perform a targeted text replacement in a file. Stages through\
  \ buffer with conflict detection.\"\"\"\n    ...\n\n@mcp.tool()\ndef find(ctx: Context,\
  \ pattern: str, file_path: str = \"\", regex: bool = False) -> str:\n    \"\"\"\
  Search file contents for a pattern. Supports substring and regex matching.\"\"\"\
  \n    ...\n\n@mcp.tool()\ndef diff(ctx: Context, file_path: str) -> str:\n    \"\
  \"\"Show the unified diff of pending buffer changes for a file.\"\"\"\n    ...\n\
  ```\n\n### No Data Model Changes\n\nThe composite tools reuse existing ViewportManager\
  \ methods. No new models, buffers, or state required.\n\n### Error Handling\n\n\
  | Failure Mode | Detection | Response |\n|-------------|-----------|----------|\n\
  | File not found (read/edit) | FileNotFoundError from viewport:open | isError, \"\
  file not found: {path}\" |\n| old_text not found (edit) | ReplaceTargetNotFoundError\
  \ | isError, \"old text not found in {file}\" |\n| Multiple matches (edit) | ReplaceAmbiguousMatchError\
  \ | isError, \"multiple matches — use read and a more specific old_text\" |\n| File\
  \ changed externally | Conflict check on save | isError with conflict details |\n\
  | Pattern not found (find) | Empty result set | \"no matches found\" (not an error)\
  \ |\n\n## Motivation (Why 5 Tools, Not 18)\n\nAdding 5 composite tools follows the\
  \ same consolidation principle as the original 6-tool design. Each composite tool\
  \ covers a distinct agent intent:\n\n- `read` = \"I need to see file contents\"\n\
  - `write` = \"I need to create or fully replace a file\"\n- `edit` = \"I need to\
  \ change specific text in a file\"\n- `find` = \"I need to search file contents\"\
  \n- `diff` = \"I need to review pending changes\"\n\nThese 5 verbs cover >95% of\
  \ file operations an agent performs. The remaining operations (clipboard, diff apply,\
  \ multi-edit staging, regex testing) are advanced workflows that benefit from the\
  \ existing tool granularity.\n\n## SC Coverage\n\n| ID | Criterion | Evidence Type\
  \ |\n|----|-----------|---------------|\n| SC-1 | `read` returns file content for\
  \ an existing file with line_start, line_end, visible text, mtime, size | `behavioral`\
  \ |\n| SC-2 | `read` with offset/limit returns the specified line range | `behavioral`\
  \ |\n| SC-3 | `read` returns error for non-existent file | `behavioral` |\n| SC-4\
  \ | `write` creates a new file with the specified content | `behavioral` |\n| SC-5\
  \ | `write` overwrites an existing file with the specified content | `behavioral`\
  \ |\n| SC-6 | `write` detects external file modification and reports conflict |\
  \ `behavioral` |\n| SC-7 | `edit` replaces old_text with new_text in the specified\
  \ file | `behavioral` |\n| SC-8 | `edit` returns error when old_text is not found\
  \ | `behavioral` |\n| SC-9 | `edit` returns error on ambiguous matches | `behavioral`\
  \ |\n| SC-10 | After `write` or `edit`, the viewport is closed (no dangling sessions)\
  \ | `behavioral` |\n| SC-11 | `find` returns structured results with line numbers\
  \ for substring match | `behavioral` |\n| SC-12 | `find` with regex=true returns\
  \ regex match results | `behavioral` |\n| SC-13 | `diff` returns unified diff of\
  \ pending buffer changes for an open file | `behavioral` |\n| SC-14 | `diff` returns\
  \ empty result when no pending changes | `behavioral` |\n| SC-15 | All 5 composite\
  \ tools use naming convention determined by iterative testing | `string` |\n| SC-16a\
  \ | Agent selects composite `read` over built-in `read` at >80% rate with optimal\
  \ naming variant — tested with `ollama/deepseek-v4-flash:cloud` | `behavioral` |\n\
  | SC-16b | Agent selects composite `write` over built-in `write` at >80% rate with\
  \ optimal naming variant — tested with `ollama/deepseek-v4-flash:cloud` | `behavioral`\
  \ |\n| SC-16c | Agent selects composite `edit` over built-in `edit` at >80% rate\
  \ with optimal naming variant — tested with `ollama/deepseek-v4-flash:cloud` | `behavioral`\
  \ |\n| SC-16d | Agent selects composite `find` over built-in `grep` at >80% rate\
  \ with optimal naming variant — tested with `ollama/deepseek-v4-flash:cloud` | `behavioral`\
  \ |\n| SC-16e | Iterative tuning achieves max selection rate across all 4 target\
  \ models — results recorded in `tmp/tool-naming-test-results.md` | `behavioral`\
  \ |\n\n> **Evidence base:** SC-16a through SC-16e test whether the semantic gap\
  \ identified in [Card 6](spec-artifacts/research/card-catalogue.md#card-6-the-semantic-gap--viewport-editor-vs-built-in)\
  \ has been closed. The card maps each agent intent to the current multi-call workflow\
  \ and the proposed single-call composite — these SCs verify that the composite tools\
  \ are actually selected over the built-in alternatives.\n| SC-17 | write/edit overlap\
  \ confusion does not exceed 30% across all 4 target models | `behavioral` |\n| SC-18\
  \ | All 7 existing tool descriptions are re-written in agent-facing, constraint-stating\
  \ style | `string` |\n| SC-19 | All tool descriptions use positive framing only\
  \ — no negative comparisons, no danger/avoidance language | `string` |\n| SC-20\
  \ | V1 verb-class testing runs against DeepSeek first as gating criterion; halt\
  \ and re-evaluate if <80% selection | `behavioral` |\n| SC-21 | Description specificity\
  \ determined by V2 testing across 3 levels (minimal, constraint-statement, elaborated)\
  \ — constraint-statement is expected winner | `behavioral` |\n| SC-22 | Evaluation\
  \ uses clean-room sub-agent semantic inspection — not grep on stderr — for all selection\
  \ rate and confusion measurements | `behavioral` |\n| SC-23 | Evaluation results\
  \ stored as `evaluation.yaml` co-located with source artifacts in the same artifact\
  \ directory | `string` |\n| SC-24 | Evaluation sub-agent result contract is frugal\
  \ — status + finding_summary + artifact_path only; full details in evaluation.yaml\
  \ | `string` |\n\n### SC-16e Model Set\n\nIterative testing runs against these 4\
  \ models to validate cross-model generalization:\n\n| Model | Name | Notes |\n|-------|------|-------|\n\
  | `ollama/deepseek-v4-flash:cloud` | DeepSeek V4 Flash (cloud) | Primary target\
  \ — primary development model |\n| `ollama/gpt-oss:20b-128k` | GPT-OSS 20B | Weaker\
  \ model — tests edge of comprehension |\n| `ollama/nemotron3:33b-128k` | Nemotron\
  \ 3 33B | Mid-range — tests naming effectiveness at scale |\n| `ollama/qwen3.6:35b-256k`\
  \ | Qwen 3.6 35B | Long-context variant — tests with large tool listing |\n\nTest\
  \ methodology per the Iterative Testing Protocol: 20 iterations per variant per\
  \ model, selection rate measurement per variable.\n\n## Relevant Research (Card\
  \ Catalogue)\n\nFull research catalogue at `spec-artifacts/research/card-catalogue.md`\
  \ with 8 cards covering:\n\n- **BiasBusters (arXiv 2510.00307):** Confirms semantic\
  \ alignment as the strongest driver of tool selection. Small description changes\
  \ shift choices. Mitigation via subset-filtering.\n- **mcp-naming-bias experiments:**\
  \ All models (Claude, GPT-4o, Gemini, DeepSeek, Mistral, Qwen, Llama) show 100%\
  \ semantic matching when tool name matches prompt intent. Claude shows least position\
  \ bias.\n- **Anthropic \"Writing Effective Tools\":** Recommends composite actions\
  \ over split tools. Namespacing by domain prefix. Tool descriptions as constraint\
  \ statements. Prefix vs suffix has non-trivial effects on selection.\n- **AWS domain-noun-verb\
  \ pattern:** `github_issue_create` — rationale is alphabetical clustering for human\
  \ browsing, not agent psychology.\n- **SEP-986:** Allows `_`, `-`, `/`, `.` in tool\
  \ names.\n- **Arcade.dev:** Verb-object naming preferred. `create_meeting` over\
  \ `schedule`.\n- **LLM Control Language (opencode-config#161):** Verb class reliability\
  \ (RQ4), Over-Specification Paradox (S* ~0.509), constructional determinacy — all\
  \ apply directly to tool naming and description engineering.\n"
