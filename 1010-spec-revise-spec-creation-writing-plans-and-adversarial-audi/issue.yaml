body: '# [SPEC] Revise spec-creation, writing-plans, and adversarial-audit workflows
  with lessons from #46


  ## Problem


  The #46 spec/plan revision cycle revealed systematic gaps in how specs and plans
  are created, structured, and audited. The `spec-creation`, `writing-plans`, and
  `adversarial-audit` skills produce artifacts that exhibit:


  - Tracking language in forward-looking specs ("implemented", "confirmed", "pending")

  - Prescriptive code content in plans (line numbers, exact import strings, assertion
  code)

  - Cross-referenced requirements that agents ignore (pipeline gates stated once,
  not per-unit)

  - Z3 models that don''t enforce pipeline completion

  - Contract preconditions that block valid state transitions


  These patterns produced a multi-hour revision cycle for a single issue. Without
  systematic correction, every future issue will repeat the same rework.


  ## Success Criteria


  | ID | Criterion | Evidence Type | Verification Method |

  |----|-----------|---------------|-------------------|

  | SC-1 | `spec-creation` outputs specs with no status/tracking language | `behavioral`
  | `opencode-cli run` spec creation prompt; verify no "implemented"/"confirmed"/"pending"
  in output |

  | SC-2 | `writing-plans` outputs RED/GREEN conditions without line numbers or exact
  code | `behavioral` | `opencode-cli run` plan creation prompt; verify no line number
  refs, no code snippets in RED/GREEN |

  | SC-3 | Plans embed pipeline gate tables per-unit, not as a single cross-reference
  | `behavioral` | `opencode-cli run` plan creation prompt; verify each unit has its
  own pipeline table |

  | SC-4 | `spec-creation` and `writing-plans` produce artifacts from a forward-looking
  "must be true" stance only | `behavioral` | `opencode-cli run` spec+plan creation;
  verify zero decision-log or status-tracker patterns |

  | SC-5 | `adversarial-audit` detects tracking language, prescriptive code, missing
  pipeline gates, and missing per-unit gate tables | `behavioral` | `opencode-cli
  run` audit of a deliberately defective spec/plan; auditor flags all four defect
  types |

  | SC-6 | `spec-creation` generates spec folder URLs for the remote issue body blockquote
  | `behavioral` | Remote issue body contains `[`.issues/{N}/`](https://github.com/{owner}/{repo}/tree/issues-data/{N})`
  blockquote |

  | SC-7 | `writing-plans` generates Z3 contracts with pipeline gates (not just domain
  variables) and no preconditions | `behavioral` | Generated contract has per-unit
  pipeline gate variables, invariants enforcing serial ordering, no `preconditions`
  list |

  | SC-8 | `adversarial-audit` contract-audit step rejects Z3 models missing pipeline
  gates or containing preconditions | `behavioral` | Auditor rejects contract with
  domain-only variables; rejects contract with non-empty `preconditions` |

  | SC-9 | `spec-creation` and `writing-plans` use sub-folder references for artifacts,
  never hardcoded file lists | `string` | Generated content contains `spec-artifacts/`
  references, not `plan.md`/`cards.md` individual file names |


