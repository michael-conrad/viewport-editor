# Z3 Contract: #46 fastmcp switch
# Models RED→GREEN transitions.
# RED = variable false (change not yet applied)
# GREEN = variable true (change applied, verified)
# Invariants enforce dependency ordering.

variables:
  # Phase 1: Package Switch
  DEP_SWITCH:
    type: bool
  IMPORT_CHANGE:
    type: bool

  # Phase 2: ctx: Context Annotation
  CTX_ANNOTATE:
    type: bool
  SESSION_ID_OK:
    type: bool

  # Phase 3: In-Memory Client (optional)
  CONFTEST:
    type: bool
  TEST_MIGRATED:
    type: bool

  # Phase 4: Session Isolation POC
  DIFF_SESSION_IDS:
    type: bool
  STATE_ISOLATION:
    type: bool

# State variables are initialised in state.yaml (all False).
# No preconditions — the contract models arbitrary intermediate states.
preconditions: []

invariants:
  # Phase 1: import requires install
  - "z3.Implies(IMPORT_CHANGE, DEP_SWITCH)"

  # Phase 2: annotation requires fastmcp installed, session_id requires annotation
  - "z3.Implies(CTX_ANNOTATE, DEP_SWITCH)"
  - "z3.Implies(SESSION_ID_OK, CTX_ANNOTATE)"

  # Phase 3: in-memory client requires fastmcp installed
  - "z3.Implies(CONFTEST, DEP_SWITCH)"
  - "z3.Implies(TEST_MIGRATED, CONFTEST)"

  # Phase 4: session isolation requires working ctx.session_id + in-memory clients
  - "z3.Implies(DIFF_SESSION_IDS, SESSION_ID_OK)"
  - "z3.Implies(DIFF_SESSION_IDS, TEST_MIGRATED)"
  - "z3.Implies(STATE_ISOLATION, SESSION_ID_OK)"
  - "z3.Implies(STATE_ISOLATION, TEST_MIGRATED)"

postconditions:
  - "z3.Not(z3.And(CTX_ANNOTATE, z3.Not(DEP_SWITCH)))"
  - "z3.Not(z3.And(SESSION_ID_OK, z3.Not(CTX_ANNOTATE)))"
  - "z3.Not(z3.And(TEST_MIGRATED, z3.Not(CONFTEST)))"
  - "z3.Not(z3.And(DIFF_SESSION_IDS, z3.Not(SESSION_ID_OK)))"
  - "z3.Not(z3.And(DIFF_SESSION_IDS, z3.Not(TEST_MIGRATED)))"
  - "z3.Not(z3.And(STATE_ISOLATION, z3.Not(SESSION_ID_OK)))"
  - "z3.Not(z3.And(STATE_ISOLATION, z3.Not(TEST_MIGRATED)))"