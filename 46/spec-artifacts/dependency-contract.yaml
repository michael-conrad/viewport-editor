  - "z3.Implies(CON_p7_structural, CON_p6_checkpoint)"
  - "z3.Implies(CON_p8_green_double, CON_p7_structural)"
  - "z3.Implies(CON_p9_vbc, CON_p8_green_double)"
  - "z3.Implies(CON_p10_audit, CON_p9_vbc)"
  - "z3.Implies(CON_p11_crossval, CON_p10_audit)"
  - "z3.Implies(CON_p12_regression, CON_p11_crossval)"
  - "z3.Implies(CON_p13_review, CON_p12_regression)"
