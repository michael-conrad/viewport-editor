# Z3 Contract: #46 fastmcp switch
# Models the 14-step implementation pipeline per unit.
# Each unit has a boolean for every pipeline gate.
# A unit's "done" variable goes True only when all 14 gates pass.

variables:
  # Domain — units of work (what must be done)
  DEP_SWITCH:
    type: bool
  IMPORT_CHANGE:
    type: bool
  CTX_ANNOTATE:
    type: bool
  SESSION_ID_OK:
    type: bool
  CONFTEST:
    type: bool
  TEST_MIGRATED:
    type: bool
  LIFESPAN_OK:
    type: bool
  SIZE_DOCUMENTED:
    type: bool
  DIFF_SESSION_IDS:
    type: bool
  STATE_ISOLATION:
    type: bool

  # Pipeline gates per unit — each unit must pass every step to complete
  # Format: {unit}_p{step_number}
  # Steps: 1=coherence, 2=baseline, 3=red, 4=red-double, 5=green,
  #        6=checkpoint, 7=structural, 8=green-double, 9=vbc,
  #        10=audit, 11=cross-val, 12=regression, 13=review, 14=exec

  # Unit 1a: Package install
  DEP_p1_coherence:
    type: bool
  DEP_p2_baseline:
    type: bool
  DEP_p3_red:
    type: bool
  DEP_p4_red_double:
    type: bool
  DEP_p5_green:
    type: bool
  DEP_p6_checkpoint:
