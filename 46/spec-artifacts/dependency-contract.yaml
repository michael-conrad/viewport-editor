postconditions:
  - "z3.Not(z3.And(IMPORT_CHANGE, z3.Not(DEP_SWITCH)))"
  - "z3.Not(z3.And(CTX_ANNOTATE, z3.Not(DEP_SWITCH)))"
  - "z3.Not(z3.And(SESSION_ID_OK, z3.Not(CTX_ANNOTATE)))"
  - "z3.Not(z3.And(CONFTEST, z3.Not(DEP_SWITCH)))"
  - "z3.Not(z3.And(TEST_MIGRATED, z3.Not(CONFTEST)))"
  - "z3.Not(z3.And(LIFESPAN_OK, z3.Not(DEP_SWITCH)))"
  - "z3.Not(z3.And(SIZE_DOCUMENTED, z3.Not(DEP_SWITCH)))"
  - "z3.Not(z3.And(DIFF_SESSION_IDS, z3.Not(SESSION_ID_OK)))"
  - "z3.Not(z3.And(DIFF_SESSION_IDS, z3.Not(TEST_MIGRATED)))"
  - "z3.Not(z3.And(STATE_ISOLATION, z3.Not(SESSION_ID_OK)))"
  - "z3.Not(z3.And(STATE_ISOLATION, z3.Not(TEST_MIGRATED)))"