  - "z3.Implies(DEP_p13_review, DEP_p12_regression)"
  - "z3.Implies(DEP_p14_exec, DEP_p13_review)"
  # Unit completion requires pipeline completion
  - "z3.Implies(DEP_SWITCH, DEP_p14_exec)"

