  - "z3.Implies(CTX_p7_structural, CTX_p6_checkpoint)"
  - "z3.Implies(CTX_p8_green_double, CTX_p7_structural)"
  - "z3.Implies(CTX_p9_vbc, CTX_p8_green_double)"
  - "z3.Implies(CTX_p10_audit, CTX_p9_vbc)"
  - "z3.Implies(CTX_p11_crossval, CTX_p10_audit)"
