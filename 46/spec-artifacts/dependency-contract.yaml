  # Unit DIF (SC-4)
  - "z3.Implies(DIF_p2_baseline, DIF_p1_coherence)"
  - "z3.Implies(DIF_p3_red, DIF_p2_baseline)"
  - "z3.Implies(DIF_p4_red_double, DIF_p3_red)"
  - "z3.Implies(DIF_p5_green, DIF_p4_red_double)"
  - "z3.Implies(DIF_p6_checkpoint, DIF_p5_green)"
  - "z3.Implies(DIF_p7_structural, DIF_p6_checkpoint)"
