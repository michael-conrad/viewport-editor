  # Pattern: pN → p(N-1) for N=2..14

  # Unit DEP (1a)
  - "z3.Implies(DEP_p2_baseline, DEP_p1_coherence)"
  - "z3.Implies(DEP_p3_red, DEP_p2_baseline)"
  - "z3.Implies(DEP_p4_red_double, DEP_p3_red)"
  - "z3.Implies(DEP_p5_green, DEP_p4_red_double)"
  - "z3.Implies(DEP_p6_checkpoint, DEP_p5_green)"
